name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download sing-box binaries
        run: |
          set -euo pipefail
          SING_BOX_VERSION=1.13.14
          BASE="$GITHUB_WORKSPACE/app/src/main/assets/libs"
          mkdir -p "$BASE/arm64-v8a" "$BASE/armeabi-v7a" "$BASE/x86_64"

          download_singbox() {
            local url="$1"
            local dest="$2"
            local tmpdir
            tmpdir="$(mktemp -d)"
            echo "Downloading $url"
            curl -fsSL "$url" -o "$tmpdir/sing-box.tar.gz"
            tar -xzf "$tmpdir/sing-box.tar.gz" -C "$tmpdir"
            local bin
            bin="$(find "$tmpdir" -type f -name 'sing-box' | head -n 1)"
            if [ -z "$bin" ]; then
              echo "sing-box binary not found in archive: $url"
              find "$tmpdir" -type f
              exit 1
            fi
            cp "$bin" "$dest"
            chmod +x "$dest"
            ls -la "$dest"
            rm -rf "$tmpdir"
          }

          download_singbox "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-android-arm64.tar.gz" "$BASE/arm64-v8a/sing-box"
          download_singbox "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-android-arm.tar.gz" "$BASE/armeabi-v7a/sing-box"
          download_singbox "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-android-amd64.tar.gz" "$BASE/x86_64/sing-box"

      - name: Generate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          ./gradle-8.5/bin/gradle wrapper
          chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk QuantumVPN-${{ github.ref_name }}.apk

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: QuantumVPN ${{ github.ref_name }}
          files: QuantumVPN-${{ github.ref_name }}.apk
          body: |
            ## QuantumVPN ${{ github.ref_name }}

            ### Исправлено
            - sing-box ядро теперь включено в APK (скачивается при сборке)
            - Обновлён конфиг sing-box 1.13 (исправлен запуск VPN)
            - Исправлены вылеты при пинге и обновлении подписок
            - Надёжное сохранение серверов (атомарная запись + бэкап)
            - Подписки и импортированные серверы больше не пропадают
          draft: false
          prerelease: false
