name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          ./gradle-8.5/bin/gradle wrapper
          chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk QuantumVPN-${{ github.ref_name }}.apk

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: QuantumVPN ${{ github.ref_name }}
          files: QuantumVPN-${{ github.ref_name }}.apk
          body: |
            ## QuantumVPN ${{ github.ref_name }}

            ### Исправлено
            - Пинг серверов с отображением в списке
            - Обновление подписок с уведомлениями
            - QR-сканер и импорт из буфера
            - Исправлено подключение VPN (broadcast, chmod sing-box)
            - Нормальный размер UI на телефоне
          draft: false
          prerelease: false
